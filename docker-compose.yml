version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oli
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build: ./backend
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/oli
      JWT_SECRET: oli_secret_change_in_prod
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
      TRUST_PROXY: "1"
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js && node index.js"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
